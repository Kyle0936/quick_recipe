<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Recipe Vault</title>
    <link rel="stylesheet" href="styles.css?v=20260403a" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Quick Recipe Vault</h1>
        <p>小红书-style recipe discovery wall ✨</p>
      </div>
      <div class="top-actions">
        <button id="lucky-button" class="lucky">🎲 I'm Feeling Hungry</button>
        <button id="open-modal">＋ Add Recipe Package</button>
      </div>
    </header>

    <main class="page">
      <section class="panel">
        <div class="filter-grid">
          <label>
            Search
            <input id="search-input" type="search" placeholder="search title / ingredient / instructions" />
          </label>
          <label>
            Tags (comma separated)
            <input id="tag-filter" type="text" placeholder="bakery, low-calorie, hosting-event" />
          </label>
          <label>
            Calories cap
            <input id="calorie-filter" type="number" min="0" placeholder="e.g. 700" />
          </label>
        </div>
        <div id="tag-chip-bar" class="chip-bar" aria-label="Popular tags"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>Recipe Feed</h2>
          <p id="result-count"></p>
        </div>
        <div id="gallery" class="feed" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="recipe-modal">
      <form id="recipe-package-form" method="dialog" class="modal-content">
        <h3>Create recipe package</h3>
        <p class="muted">Generate a markdown file + image paths to commit under <code>/recipes</code>.</p>

        <label>Recipe title <input id="m-title" required /></label>
        <label>Calories <input id="m-calories" type="number" min="0" required /></label>
        <label>Tags (comma-separated) <input id="m-tags" placeholder="bakery, hosting-event" required /></label>
        <label>Ingredients (one per line) <textarea id="m-ingredients" rows="5" required></textarea></label>
        <label>Instructions (one per line or numbered) <textarea id="m-instructions" rows="5" required></textarea></label>
        <label>Upload multiple images <input id="m-images" type="file" accept="image/*" multiple /></label>

        <div id="m-preview-images" class="preview-images"></div>

        <menu>
          <button value="cancel" type="button" id="close-modal">Cancel</button>
          <button type="submit">Generate package</button>
        </menu>
      </form>
    </dialog>

    <dialog id="package-modal">
      <div class="modal-content">
        <h3>Recipe package generated</h3>
        <a id="download-markdown" download>Download recipe markdown</a>
        <pre id="package-preview"></pre>
        <button id="close-package">Close</button>
      </div>
    </dialog>

    <template id="card-template">
      <article class="recipe-card">
        <img class="cover" alt="Recipe cover" />
        <div class="thumbs"></div>
        <div class="card-body">
          <h3 class="title"></h3>
          <p class="meta"></p>
          <p class="tags"></p>
          <details>
            <summary>Ingredients</summary>
            <pre class="ingredients"></pre>
          </details>
          <details>
            <summary>Instructions</summary>
            <pre class="instructions"></pre>
          </details>
        </div>
      </article>
    </template>

    <script src="app.js?v=20260403a"></script>
  </body>
</html>
